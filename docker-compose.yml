# CanvasForms — Production Docker Compose
# Usage: docker compose up -d
# Requires: .env file with all secrets

services:
  postgres:
    image: postgres:16-alpine
    container_name: canvasforms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: canvasforms
      POSTGRES_USER: canvasforms
      POSTGRES_PASSWORD: ${DB_PASSWORD:-canvasforms_prod_2024}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U canvasforms"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: canvasforms-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: canvasforms-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://canvasforms:${DB_PASSWORD:-canvasforms_prod_2024}@postgres:5432/canvasforms
      REDIS_URL: redis://redis:6379
      PORT: "8000"
      NODE_ENV: prod
      BASE_URL: ${API_BASE_URL:-http://localhost:8000}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-noreply@canvasforms.io}
    ports:
      - "8000:8000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: canvasforms-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${API_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      NEXT_PUBLIC_APP_URL: ${APP_URL:-http://localhost:3000}
    ports:
      - "3000:3000"

  # Nginx reverse proxy (optional — for SSL termination)
  # nginx:
  #   image: nginx:alpine
  #   container_name: canvasforms-nginx
  #   restart: unless-stopped
  #   depends_on:
  #     - api
  #     - web
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./certs:/etc/nginx/certs:ro

volumes:
  pgdata:
